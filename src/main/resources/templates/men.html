<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Men's Collection</title>
  <link rel="stylesheet" href="/css/men.css"/>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">MensWear</div>

  <div class="search-box">
    <input type="text" id="searchInput"
           placeholder="Search men's fashion..."
           oninput="filterProducts()">
  </div>

  <a href="/cart" class="cart-icon">🛒</a>
</div>

<button id="scrollToTopBtn" title="Go to top">⬆</button>

<!-- HERO -->
<div class="hero"
     style="background-image: url('https://images.unsplash.com/photo-1521572163474-6864f9cf17ab');">
  <div class="hero-content">
    <h1>Style that Speaks</h1>
    <p>Upgrade your wardrobe with premium men’s fashion.</p>
    <button>Explore Now</button>
  </div>
</div>

<!-- PRODUCTS -->
<div class="card-container">

  <!-- NO PRODUCTS -->
  <div th:if="${#lists.isEmpty(products)}">
    <p>No products available.</p>
  </div>

  <!-- PRODUCT LIST -->
  <div class="card" th:each="product : ${products}">

    <h3 th:text="${product.name}"></h3>

    <img th:src="${product.imageUrl}" alt="Product Image"/>

    <p th:text="${product.description}"></p>

    <p>₹ <span th:text="${product.price}"></span></p>

<div class="buttons">
	<!-- BUY NOW -->
    <a th:href="@{/payment}" class="btn btn-buy">Buy Now</a>
	
	
    <!-- ADD TO CART (FIXED) -->
    <form th:action="@{/cart/add}" method="post">
      <input type="hidden" name="title" th:value="${product.name}">
      <input type="hidden" name="description" th:value="${product.description}">
      <input type="hidden" name="price" th:value="${product.price}">
      <input type="hidden" name="imageUrl" th:value="${product.imageUrl}">
      <button type="submit" class="btn btn-cart">Add to Cart</button>
    </form>

     </div>    
	</div>
</div>

<center>
  <a href="/home">
    <button class="home-btn">Home</button>
  </a>
</center>

<script src="/js/men.js"></script>
</body>
</html>
