<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Seller Dashboard</title>
    <link rel="stylesheet" href="/css/seller-dashboard.css">
    
</head>
<body>
<h2>My Products</h2>
<a th:href="@{/seller/add-product}">Add New Product</a>
<table>
    <tr>
        <th>Name</th>
        <th>Category</th>
        <th>Price</th>
        <th>Actions</th>
    </tr>
    <tr th:each="product : ${products}">
        <td th:text="${product.name}"></td>
        <td th:text="${product.category}"></td>
        <td th:text="${product.price}"></td>
        <td>
            <!-- Edit button (optional) -->
           <a th:href="@{/seller/edit-product(productId=${product.id})}"
   class="btn-edit">Edit</a>

            <!-- Delete button -->
            <form th:action="@{/seller/delete-product}" method="post" style="display:inline">
                <input type="hidden" name="productId" th:value="${product.id}" />
                <button type="submit" onclick="return confirm('Are you sure you want to delete this product?');">
                    Delete
                </button>
            </form>
        </td>
    </tr>
</table>

<br/><br/>
<a href="/home"><button>Home</button></a>

</body>
</html>
