  <div class="hero-content">
    <h1>Timeless Elegance</h1>
    <p>Explore our stunning collection of fine jewellery.</p>
    <button>Discover Now</button>
  </div>
</div>

<!-- PRODUCTS -->
<div class="card-container">

  <!-- ✅ EMPTY CHECK -->
  <div th:if="${#lists.isEmpty(jewels)}">
    <p style="text-align:center;">No jewellery available.</p>
  </div>

  <!-- ✅ JEWELLERY LIST -->
  <div class="card" th:each="jewel : ${jewels}">
    <h3 th:text="${jewel.name}"></h3>

    <img th:src="${jewel.imageUrl}"
         th:alt="${jewel.name}" />

    <p th:text="${jewel.description}"></p>

    <p>₹ <span th:text="${jewel.price}"></span></p>

    <div class="buttons">

      <!-- BUY NOW -->
      <a th:href="@{/payment}" class="btn btn-buy">Buy Now</a>

      <!-- ADD TO CART -->
      <form th:action="@{/cart/add}" method="post">
        <input type="hidden" name="title" th:value="${jewel.name}">
        <input type="hidden" name="description" th:value="${jewel.description}">
        <input type="hidden" name="price" th:value="${jewel.price}">
        <input type="hidden" name="imageUrl" th:value="${jewel.imageUrl}">
        <button type="submit" class="btn btn-cart">Add to Cart</button>
      </form>

    </div>
  </div>
</div>

<!-- Home -->
<center>
  <a href="/home">
    <button class="home-btn">Home</button>
  </a>
</center>

<!-- JS -->
<script src="/js/jewels.js"></script>
</body>
</html>
