<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <link rel="stylesheet" th:href="@{/css/login.css}">
  <link rel="icon" th:href="@{/images/logo.jpg}">
</head>
<body>
  <div class="background">
    <div class="shape"></div>
    <div class="shape"></div>
  </div>

  <form th:action="@{/login}" method="post" th:object="${user}">
    <h3>Login</h3>

    <label for="email">Email</label>
    <input type="email" id="email" th:field="*{email}" name="email" placeholder="Email" required>

   <label for="password">Password</label>

<div style="position: relative;">
  <input 
    type="password" 
    id="password" 
    th:field="*{password}" 
    name="password" 
    placeholder="Password" 
    required
  >

  <span 
    onclick="togglePassword()" 
    style="
      position: absolute;
      right: 10px;
      top: 35%;
      transform: translateY(-50%);
      cursor: pointer;
      user-select: none;
    "
  >
    👀
  </span>
</div>

    <div th:if="${error}" style="color:red; text-align:center; margin-bottom:10px;">
      <p th:text="${error}"></p>
    </div>

    <button type="submit">Log In</button>

    <div class="social">
      <button type="button" class="go">Google</button>
      <button type="button" class="fb">Facebook</button>
    </div>

    <div id="form-footer">
      Don't have an account?
      <a th:href="@{/signup}">Signup</a>
    </div>
  </form>

  <script th:src="@{/js/login.js}"></script>
  <script th:src="@{/js/sign.js}" defer></script>
</body>
</html>
