    <h2>Select Payment Method</h2>

        <input type="number" placeholder="CVV">
        <button class="pay-btn">Pay Now</button>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        function showSection(sectionId) {
            var sections = document.querySelectorAll('.payment-section');
            sections.forEach(function(section) {
                section.style.display = 'none';
            });
            document.getElementById(sectionId).style.display = 'block';

            var buttons = document.querySelectorAll('.payment-methods button');
            buttons.forEach(function(btn) {
                btn.classList.remove('active');
            });
            var activeButton = Array.from(buttons).find(btn => btn.textContent.toLowerCase().includes(sectionId));
            if(activeButton) activeButton.classList.add('active');
        }

        showSection('card'); // Show card section by default
        /*]]>*/
    </script>
