<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shoes Collection</title>
  <link rel="stylesheet" href="/css/shoes.css"/>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
  <div class="logo">ShoeStore</div>
  <div class="search-box">
    <input type="text" id="searchInput"
           placeholder="Search shoes..."
           oninput="filterProducts()">
  </div>
  <a href="/cart" class="cart-icon">🛒</a>
</div>

<!-- Scroll to top -->
<button id="scrollToTopBtn" title="Go to top">⬆</button>

<!-- Hero -->
<div class="hero"
     style="background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQYLtAmSlaSROq9hwBaHg0BB6O69qCMvDTO4Q&s');">
  <div class="hero-content">
    <h1>Step in Style</h1>
    <p>Explore our premium shoe collection.</p>
    <button>Shop Now</button>
  </div>
</div>

<!-- PRODUCTS -->
<div class="card-container">

  <!-- ✅ EMPTY CHECK -->
  <div th:if="${#lists.isEmpty(products)}">
    <p style="text-align:center;">No products available.</p>
  </div>

  <!-- ✅ PRODUCT LIST -->
  <div class="card" th:each="product : ${products}">
    <h3 th:text="${product.name}"></h3>

    <img th:src="${product.imageUrl}"
         th:alt="${product.name}" />

    <p th:text="${product.description}"></p>

    <p>₹ <span th:text="${product.price}"></span></p>

    <div class="buttons">

      <!-- BUY NOW -->
      <a th:href="@{/payment}" class="btn btn-buy">Buy Now</a>

      <!-- ADD TO CART -->
      <form th:action="@{/cart/add}" method="post">
        <input type="hidden" name="title" th:value="${product.name}">
        <input type="hidden" name="description" th:value="${product.description}">
        <input type="hidden" name="price" th:value="${product.price}">
        <input type="hidden" name="imageUrl" th:value="${product.imageUrl}">
        <button type="submit" class="btn btn-cart">Add to Cart</button>
      </form>

    </div>
  </div>
</div>

<!-- Home -->
<center>
  <a href="/home">
    <button class="home-btn">Home</button>
  </a>
</center>

<!-- JS -->
<script src="/js/shoes.js"></script>
</body>
</html>
