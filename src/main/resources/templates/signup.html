<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Signup Page</title>

  <link rel="stylesheet" th:href="@{/CSS/sign.css}" />
  <link rel="shortcut icon" th:href="@{/Images/logo.jpg}" type="image/x-icon">
</head>

<body>
  <div id="signup-container">
    <form id="signup-form" th:action="@{/signup}" th:object="${user}" method="post">
      <h1>Sign Up</h1>

      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" id="username" placeholder="Enter your username">
        <span id="usernameError" class="error"></span>
      </div>

	  <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" id="mail" placeholder="Enter your email">
        <span id="mailError" class="error"></span>
      </div>
      
     <div class="form-group">
 
	  <label>Password</label>
	  <div style="position:relative;">
	    <input type="password" name="password" id="password" placeholder="Enter your password" style="padding-right:35px;">
	    <span onclick="toggle('password')" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;">👁️</span>
	  </div>
	  <span id="passwordError" class="error"></span>
	</div>
	
	<div class="form-group">
	  <label>Confirm Password</label>
	  <div style="position:relative;">
	    <input type="password" id="Cpassword" placeholder="Re-enter your password" style="padding-right:35px;">
	    <span onclick="toggle('Cpassword')" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;">👁️</span>
	  </div>
	  <span id="CpasswordError" class="error"></span>
	</div>


      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" name="phone" id="num" placeholder="Enter your phone number">
        <span id="numError" class="error"></span>
      </div>

      <div class="form-group">
        <label>Gender</label>
        <div class="gender-options">
          <label><input type="radio" name="gender" value="male"> Male</label>
          <label><input type="radio" name="gender" value="female"> Female</label>
          <label><input type="radio" name="gender" value="other"> Other</label>
        </div>
        <span id="genderError" class="error"></span>
      </div>
      
      <div class="form-group">
		  <label>Select Role</label>
		  <label><input type="radio" name="User" value="user"> User</label>
		  <span id="roleError" class="error"></span>
		</div>
      
  		<div th:if="${error}" style="color:red; text-align:center; margin-bottom:10px;">
		    <p th:text="${error}"></p>
		</div>
  		
      <div id="button-group">
        <button type="submit" id="sub-btn">Sign Up</button>
        <button type="reset" id="cancel-btn">Cancel</button>
      </div>

      <div id="form-footer">
        Already have an account? <a th:href="@{/login}">Login</a>
      </div>
    </form>
  </div>

  <script th:src="@{/JS/sign.js}"></script>
  <script>
    /* show popup if signup successful */
    const success = /*[[${success}]]*/ false;
    if (success) {
        alert("Signup successful! Redirecting to login page...");
        window.location.href = "/login";
    }
	</script>
	
	<script>
	function toggle(id){const i=document.getElementById(id);i.type=i.type==="password"?"text":"password";}
	</script>
		
  
</body>
</html>
