<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<div class="dashboard">

    <h2>Admin Dashboard</h2>

    <ul class="nav-links">
        <li><a href="/admin/users">Manage Users</a></li>
        <li><a href="/admin/sellers">Manage Sellers</a></li>
        <li><a href="/admin/products">Manage Products</a></li>
    </ul>

    <h3>Create Seller</h3>

    <form action="/admin/create-seller" method="post">
        <input type="text" name="username" placeholder="Seller Username" required />
        <input type="email" name="email" placeholder="Seller Email" required />
        
        <div style="position:relative;">
		  <input type="password" name="password" id="password" placeholder="Password" required style="padding-right:8px;">
		  <span onclick="toggle('password')" style="position:absolute;right:1px;top:50%;transform:translateY(-50%);cursor:pointer;">👁️</span>
		</div>

        <button type="submit">Create Seller</button>
    </form>

    <a class="logout-btn" href="/logout">Logout</a>

</div>

<script>
function toggle(id){const i=document.getElementById(id);i.type=i.type==="password"?"text":"password";}
</script>

</body>
</html>
